<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DJDownload</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0c;
    --surface: #111116;
    --border: #222230;
    --accent: #e8ff00;
    --accent2: #00d4ff;
    --danger: #ff4444;
    --success: #00ff88;
    --muted: #55556a;
    --text: #e0e0f0;
    --mono: 'Share Tech Mono', monospace;
    --sans: 'Barlow', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 15px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 32px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .logo {
    font-family: var(--mono);
    font-size: 22px;
    letter-spacing: 0.08em;
    color: var(--accent);
    text-shadow: 0 0 18px rgba(232,255,0,0.4);
  }
  .logo span { color: var(--muted); }

  nav { display: flex; gap: 4px; }
  nav button {
    background: none;
    border: 1px solid transparent;
    color: var(--muted);
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 6px 16px;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.15s;
  }
  nav button:hover { color: var(--text); border-color: var(--border); }
  nav button.active { color: var(--accent); border-color: var(--accent); background: rgba(232,255,0,0.06); }

  /* ── Layout ── */
  main {
    flex: 1;
    display: grid;
    grid-template-columns: 420px 1fr;
    gap: 0;
    height: calc(100vh - 61px);
  }

  .panel {
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 28px 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .panel-right {
    overflow-y: auto;
    padding: 28px 28px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* ── Section labels ── */
  .section-label {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }

  /* ── Form elements ── */
  label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 5px; }

  input[type="text"], input[type="url"], select {
    width: 100%;
    background: #0d0d14;
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    padding: 9px 12px;
    border-radius: 4px;
    outline: none;
    transition: border-color 0.15s;
  }
  input:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(232,255,0,0.08); }
  input::placeholder { color: var(--muted); }

  .field { display: flex; flex-direction: column; gap: 6px; }

  /* Toggle row */
  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid #1a1a26;
  }
  .toggle-label { font-size: 13px; font-weight: 600; }
  .toggle-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .toggle {
    position: relative;
    width: 42px; height: 22px;
    flex-shrink: 0;
  }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-track {
    position: absolute; inset: 0;
    background: #222230;
    border-radius: 11px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .toggle-track::after {
    content: '';
    position: absolute;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--muted);
    top: 3px; left: 3px;
    transition: all 0.2s;
  }
  .toggle input:checked + .toggle-track { background: rgba(232,255,0,0.2); }
  .toggle input:checked + .toggle-track::after { left: 23px; background: var(--accent); }

  /* Buttons */
  .btn-primary {
    background: var(--accent);
    color: #000;
    border: none;
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 12px 24px;
    border-radius: 4px;
    cursor: pointer;
    width: 100%;
    transition: all 0.15s;
    box-shadow: 0 0 24px rgba(232,255,0,0.2);
  }
  .btn-primary:hover { background: #f4ff33; box-shadow: 0 0 32px rgba(232,255,0,0.35); transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .btn-secondary {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 8px 18px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-secondary:hover { border-color: var(--accent2); color: var(--accent2); }

  /* ── Job cards ── */
  .job-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px 16px;
    cursor: pointer;
    transition: border-color 0.15s;
    position: relative;
  }
  .job-card:hover { border-color: #333348; }
  .job-card.active { border-color: var(--accent2); }
  .job-card.selected { border-color: var(--accent); background: rgba(232,255,0,0.03); }

  .job-card-url {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent2);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 6px;
  }
  .job-card-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .job-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 11px;
    color: var(--muted);
  }

  .badge {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    padding: 2px 8px;
    border-radius: 2px;
    text-transform: uppercase;
  }
  .badge-queued  { background: #1a1a30; color: #7777aa; }
  .badge-running { background: rgba(0,212,255,0.12); color: var(--accent2); animation: pulse 1.5s infinite; }
  .badge-done    { background: rgba(0,255,136,0.1); color: var(--success); }
  .badge-error   { background: rgba(255,68,68,0.1); color: var(--danger); }

  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }

  /* ── Log panel ── */
  .log-box {
    background: #070709;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 14px;
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.7;
    color: #a0a0c0;
    overflow-y: auto;
    flex: 1;
    min-height: 300px;
    max-height: 500px;
    white-space: pre-wrap;
    word-break: break-all;
  }
  .log-box .log-success { color: var(--success); }
  .log-box .log-error   { color: var(--danger); }
  .log-box .log-warn    { color: #ffaa00; }
  .log-box .log-info    { color: var(--accent2); }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 12px;
    gap: 8px;
  }
  .empty-state-icon { font-size: 40px; opacity: 0.2; }

  /* ── Settings page ── */
  .settings-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 28px;
    max-width: 760px;
  }
  .settings-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .settings-card h3 {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.15em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .save-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 8px;
  }
  .save-ok { color: var(--success); font-size: 13px; font-weight: 600; }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* Page sections */
  .page { display: none; flex-direction: column; height: 100%; }
  .page.visible { display: flex; }

  /* Detail header */
  .detail-header {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 16px 18px;
  }
  .detail-title { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
  .detail-url { font-family: var(--mono); font-size: 11px; color: var(--accent2); }
  .detail-meta { display: flex; gap: 14px; margin-top: 10px; font-size: 12px; color: var(--muted); align-items: center; }
  .detail-result { font-family: var(--mono); font-size: 11px; color: var(--success); margin-top: 8px; word-break: break-all; }
</style>
</head>
<body>

<header>
  <div class="logo">DJ<span>/</span>DOWNLOAD</div>
  <nav>
    <button class="active" data-page="download">Download</button>
    <button data-page="jobs">Queue</button>
    <button data-page="settings">Settings</button>
  </nav>
</header>

<main>

  <!-- ═══════════════════════════════════════════
       LEFT PANEL (always visible)
  ═══════════════════════════════════════════ -->
  <div class="panel">

    <!-- Submit form -->
    <div>
      <div class="section-label">New Download</div>
      <div style="display:flex;flex-direction:column;gap:12px;">

        <div class="field">
          <label>YouTube URL</label>
          <input type="url" id="urlInput" placeholder="https://youtube.com/watch?v=..." />
        </div>

        <div class="field">
          <label>Artist Override <span style="color:#444;font-weight:400;text-transform:none;">(optional)</span></label>
          <input type="text" id="artistInput" placeholder="Leave blank to use settings" />
        </div>

        <button class="btn-primary" id="submitBtn" onclick="submitJob()">
          ▶ &nbsp;Start Download
        </button>
      </div>
    </div>

    <!-- Recent jobs mini list -->
    <div style="flex:1;overflow:hidden;display:flex;flex-direction:column;">
      <div class="section-label" style="display:flex;justify-content:space-between;">
        <span>Recent Jobs</span>
        <span id="jobCount" style="color:#444">0</span>
      </div>
      <div id="jobList" style="flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:8px;">
        <div class="empty-state" style="height:120px;">
          <div class="empty-state-icon">◎</div>
          <span>No jobs yet</span>
        </div>
      </div>
    </div>

  </div>

  <!-- ═══════════════════════════════════════════
       RIGHT PANEL
  ═══════════════════════════════════════════ -->
  <div class="panel-right">

    <!-- Download / Job detail page -->
    <div id="page-download" class="page visible">
      <div id="detailEmpty" class="empty-state" style="height:100%;min-height:300px;">
        <div class="empty-state-icon">⬇</div>
        <span>Submit a URL to begin</span>
        <span style="color:#333;font-size:11px;margin-top:4px;">Job logs will appear here</span>
      </div>

      <div id="detailView" style="display:none;flex-direction:column;gap:14px;">
        <div class="detail-header">
          <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;">
            <div style="flex:1;min-width:0;">
              <div class="detail-title" id="dTitle">—</div>
              <div class="detail-url" id="dUrl">—</div>
            </div>
            <span class="badge" id="dBadge">—</span>
          </div>
          <div class="detail-meta">
            <span id="dCreated">—</span>
            <span id="dFinished" style="display:none">→ <span id="dFinishedVal">—</span></span>
          </div>
          <div class="detail-result" id="dResult" style="display:none;"></div>
        </div>

        <div class="section-label">Job Log</div>
        <div class="log-box" id="logBox"></div>
      </div>
    </div>

    <!-- Settings page -->
    <div id="page-settings" class="page">
      <div class="section-label">Configuration</div>
      <div class="settings-grid">
        <div class="settings-card">
          <h3>Audio</h3>
          <div class="toggle-row">
            <div>
              <div class="toggle-label">Enable Audio Downloads</div>
              <div class="toggle-sub">Download MP3 with tags + art</div>
            </div>
            <label class="toggle">
              <input type="checkbox" id="audioEnabled" />
              <span class="toggle-track"></span>
            </label>
          </div>
          <div class="field">
            <label>Output Directory</label>
            <input type="text" id="audioDir" placeholder="/downloads/audio" />
          </div>
        </div>

        <div class="settings-card">
          <h3>Video</h3>
          <div class="toggle-row">
            <div>
              <div class="toggle-label">Enable Video Downloads</div>
              <div class="toggle-sub">Download best quality video</div>
            </div>
            <label class="toggle">
              <input type="checkbox" id="videoEnabled" />
              <span class="toggle-track"></span>
            </label>
          </div>
          <div class="field">
            <label>Output Directory</label>
            <input type="text" id="videoDir" placeholder="/downloads/video" />
          </div>
        </div>

        <div class="settings-card" style="grid-column:1/-1;">
          <h3>Artist Tagging</h3>
          <div class="field">
            <label>Mode</label>
            <select id="artistMode">
              <option value="channel">Use YouTube Channel Name</option>
              <option value="custom">Use Custom Artist Name</option>
            </select>
          </div>
          <div class="field" id="customArtistField">
            <label>Custom Artist Name</label>
            <input type="text" id="customArtist" placeholder="e.g. Boiler Room" />
          </div>
        </div>
      </div>

      <div class="save-bar">
        <button class="btn-secondary" onclick="saveSettings()">Save Settings</button>
        <span class="save-ok" id="saveOk" style="display:none;">✓ Saved</span>
      </div>
    </div>

    <!-- Jobs list page (full detail) -->
    <div id="page-jobs" class="page">
      <div class="section-label">All Jobs</div>
      <div id="allJobsList" style="display:flex;flex-direction:column;gap:8px;"></div>
    </div>

  </div>
</main>

<script>
  const API = '';
  let selectedJobId = null;
  let pollTimer = null;

  // ── Navigation ──────────────────────────────
  document.querySelectorAll('nav button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const page = btn.dataset.page;
      document.querySelectorAll('.page').forEach(p => p.classList.remove('visible'));
      document.getElementById(`page-${page}`).classList.add('visible');
      if (page === 'jobs') renderAllJobs();
      if (page === 'settings') loadSettings();
    });
  });

  // ── Submit Job ───────────────────────────────
  async function submitJob() {
    const url = document.getElementById('urlInput').value.trim();
    const artist = document.getElementById('artistInput').value.trim();
    if (!url) { alert('Please enter a YouTube URL.'); return; }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = '⏳  Submitting...';

    try {
      const res = await fetch(`${API}/api/jobs`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url, artist_override: artist || null }),
      });
      const data = await res.json();
      document.getElementById('urlInput').value = '';
      document.getElementById('artistInput').value = '';
      selectJob(data.job_id);
      startPolling();
    } catch (e) {
      alert('Failed to submit job: ' + e);
    } finally {
      btn.disabled = false;
      btn.innerHTML = '▶ &nbsp;Start Download';
    }
  }

  // ── Job selection & detail ───────────────────
  async function selectJob(jobId) {
    selectedJobId = jobId;
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.querySelector('[data-page="download"]').classList.add('active');
    document.querySelectorAll('.page').forEach(p => p.classList.remove('visible'));
    document.getElementById('page-download').classList.add('visible');
    await refreshDetail();
    startPolling();
  }

  async function refreshDetail() {
    if (!selectedJobId) return;
    try {
      const res = await fetch(`${API}/api/jobs/${selectedJobId}`);
      const job = await res.json();
      renderDetail(job);
      renderJobList();
    } catch {}
  }

  function renderDetail(job) {
    document.getElementById('detailEmpty').style.display = 'none';
    document.getElementById('detailView').style.display = 'flex';

    document.getElementById('dUrl').textContent = job.url;
    document.getElementById('dTitle').textContent = job.url; // will update when log shows title

    const badge = document.getElementById('dBadge');
    badge.textContent = job.status;
    badge.className = `badge badge-${job.status}`;

    document.getElementById('dCreated').textContent = formatTime(job.created_at);
    if (job.finished_at) {
      document.getElementById('dFinished').style.display = '';
      document.getElementById('dFinishedVal').textContent = formatTime(job.finished_at);
    }

    const resultEl = document.getElementById('dResult');
    if (job.result && job.result.audio_path) {
      resultEl.style.display = '';
      resultEl.textContent = '→ ' + job.result.audio_path;
    } else {
      resultEl.style.display = 'none';
    }

    // Render logs with color
    const logBox = document.getElementById('logBox');
    const wasAtBottom = logBox.scrollHeight - logBox.scrollTop <= logBox.clientHeight + 40;
    logBox.innerHTML = job.logs.map(line => colorLine(line)).join('\n');
    if (wasAtBottom) logBox.scrollTop = logBox.scrollHeight;
  }

  function colorLine(line) {
    if (line.includes('❌') || line.toLowerCase().includes('error') || line.toLowerCase().includes('failed'))
      return `<span class="log-error">${esc(line)}</span>`;
    if (line.includes('✅') || line.includes('🎉') || line.includes('Tagged'))
      return `<span class="log-success">${esc(line)}</span>`;
    if (line.includes('⚠'))
      return `<span class="log-warn">${esc(line)}</span>`;
    if (line.includes('Fetching') || line.includes('Starting') || line.includes('Title') || line.includes('Artist'))
      return `<span class="log-info">${esc(line)}</span>`;
    return esc(line);
  }
  function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function formatTime(iso) { return iso ? new Date(iso + 'Z').toLocaleTimeString() : '—'; }

  // ── Job list (sidebar) ───────────────────────
  let allJobs = [];

  async function renderJobList() {
    try {
      const res = await fetch(`${API}/api/jobs`);
      allJobs = await res.json();
    } catch { return; }

    document.getElementById('jobCount').textContent = allJobs.length;
    const container = document.getElementById('jobList');
    if (!allJobs.length) {
      container.innerHTML = `<div class="empty-state" style="height:120px;"><div class="empty-state-icon">◎</div><span>No jobs yet</span></div>`;
      return;
    }
    container.innerHTML = allJobs.slice(0, 20).map(job => `
      <div class="job-card ${job.id === selectedJobId ? 'selected' : ''} ${job.status === 'running' ? 'active' : ''}"
           onclick="selectJob('${job.id}')">
        <div class="job-card-url">${esc(job.url)}</div>
        <div class="job-meta">
          <span class="badge badge-${job.status}">${job.status}</span>
          <span>${formatTime(job.created_at)}</span>
        </div>
      </div>
    `).join('');
  }

  async function renderAllJobs() {
    try {
      const res = await fetch(`${API}/api/jobs`);
      allJobs = await res.json();
    } catch { return; }

    const container = document.getElementById('allJobsList');
    if (!allJobs.length) {
      container.innerHTML = `<div class="empty-state"><div class="empty-state-icon">◎</div><span>No jobs yet</span></div>`;
      return;
    }
    container.innerHTML = allJobs.map(job => `
      <div class="job-card" onclick="selectJob('${job.id}')">
        <div class="job-card-url">${esc(job.url)}</div>
        <div class="job-meta">
          <span class="badge badge-${job.status}">${job.status}</span>
          <span>${formatTime(job.created_at)}</span>
          ${job.finished_at ? `<span>finished ${formatTime(job.finished_at)}</span>` : ''}
        </div>
        ${job.result && job.result.audio_path ? `<div style="font-family:var(--mono);font-size:10px;color:var(--success);margin-top:6px;word-break:break-all;">${esc(job.result.audio_path)}</div>` : ''}
      </div>
    `).join('');
  }

  // ── Polling ──────────────────────────────────
  function startPolling() {
    if (pollTimer) return;
    pollTimer = setInterval(async () => {
      await refreshDetail();
      await renderJobList();
      // Stop polling if no running jobs
      const running = allJobs.some(j => j.status === 'running' || j.status === 'queued');
      if (!running) {
        clearInterval(pollTimer);
        pollTimer = null;
      }
    }, 1500);
  }

  // ── Settings ─────────────────────────────────
  async function loadSettings() {
    try {
      const res = await fetch(`${API}/api/settings`);
      const s = await res.json();
      document.getElementById('audioEnabled').checked = s.audio?.enabled ?? true;
      document.getElementById('audioDir').value = s.audio?.output_dir ?? '';
      document.getElementById('videoEnabled').checked = s.video?.enabled ?? true;
      document.getElementById('videoDir').value = s.video?.output_dir ?? '';
      document.getElementById('artistMode').value = s.artist?.mode ?? 'channel';
      document.getElementById('customArtist').value = s.artist?.custom_name ?? '';
      toggleCustomArtist();
    } catch {}
  }

  async function saveSettings() {
    const body = {
      audio_enabled: document.getElementById('audioEnabled').checked,
      audio_output_dir: document.getElementById('audioDir').value,
      video_enabled: document.getElementById('videoEnabled').checked,
      video_output_dir: document.getElementById('videoDir').value,
      artist_mode: document.getElementById('artistMode').value,
      artist_custom_name: document.getElementById('customArtist').value,
    };
    await fetch(`${API}/api/settings`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const ok = document.getElementById('saveOk');
    ok.style.display = '';
    setTimeout(() => ok.style.display = 'none', 2000);
  }

  function toggleCustomArtist() {
    const show = document.getElementById('artistMode').value === 'custom';
    document.getElementById('customArtistField').style.display = show ? '' : 'none';
  }
  document.getElementById('artistMode').addEventListener('change', toggleCustomArtist);

  // ── Init ─────────────────────────────────────
  renderJobList();
</script>
</body>
</html>
